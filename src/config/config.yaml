# Dual-SR Configuration

# Model Architecture
model:
  num_residual_blocks: 16
  num_features: 64
  scale: 4
  in_channels: 3
  out_channels: 3
  res_scale: 0.1
  use_mean_shift: true

# Data
data:
  dataset_dir: "dataset"
  hr_size: 256
  lr_size: 64
  patch_size: 0 
  blur_sigma: 1.5
  use_hf: true
  hf_dataset: "timm/resisc45"
  seed: 42
  train_split: 0.70
  val_split: 0.15
  test_split: 0.15

# Training
training:
  batch_size: 16
  num_workers: 4
  epochs: 100
  learning_rate: 0.0001
  weight_decay: 0
  grad_clip: 1.0    # Max gradient norm; prevents occasional bad batch from corrupting weights
  amp: true         # Automatic Mixed Precision — ~1.5–2× GPU speedup, no accuracy trade-off

  # Loss weights
  l1_weight: 1.0
  ssim_weight: 0.1
  use_ssim: true
  
  # Scheduler
  scheduler:
    type: "ReduceLROnPlateau"
    patience: 10
    factor: 0.5
    min_lr: 0.00001
  
  # Early stopping
  early_stopping:
    patience: 20
    min_delta: 0.001

# Checkpoints
checkpoint:
  save_dir: "checkpoints"
  save_every: 10
  keep_best: true

# Logging
logging:
  log_dir: "logs"
  log_every: 100
  use_tensorboard: true

# Evaluation
evaluation:
  output_dir: "outputs"
  save_images: true
  compute_metrics: ["psnr", "ssim"]
  blind_metrics: ["niqe", "brisque"]
